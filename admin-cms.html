<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMS Admin SEP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Menyembunyikan scrollbar untuk tampilan mirip aplikasi native */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        /* Animasi Transisi Tab */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-black text-gray-200 font-sans min-h-screen relative pb-20">

    <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 px-6 py-4 shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-xl font-extrabold text-yellow-400 tracking-wide">CMS ADMIN</h1>
            <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">Serikat Ekonomi Pesantren</p>
        </div>
        <div id="global-loader" class="hidden">
            <svg class="animate-spin h-5 w-5 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>
    </header>

    <main class="p-6">
        
        <div id="status-pesan" class="hidden mb-6 p-4 rounded-xl text-sm font-bold text-center border"></div>

        <div id="view-beranda" class="tab-content active">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-bold text-yellow-400 uppercase tracking-wider text-sm">Berita Terpublikasi</h2>
                <button onclick="loadDaftarBerita()" class="text-xs bg-gray-800 text-gray-300 px-3 py-1 rounded-lg hover:bg-gray-700 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Refresh
                </button>
            </div>
            
            <div id="list-berita-container" class="space-y-4">
                <p class="text-center text-gray-500 text-sm mt-10">Memuat data berita...</p>
            </div>
        </div>

        <div id="view-posting" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <h2 id="form-title" class="font-bold text-yellow-400 uppercase tracking-wider text-sm">Buat Berita Baru</h2>
                <button id="btn-batal-edit" onclick="batalEdit()" class="hidden text-xs bg-red-900/50 text-red-400 px-3 py-1 rounded-lg border border-red-800 hover:bg-red-900 transition-colors">
                    Batal Edit
                </button>
            </div>

            <form id="form-berita" onsubmit="simpanBerita(event)" class="space-y-6">
                <input type="hidden" id="edit-id" value="">

                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-inner">
                    <label class="block text-xs font-bold text-yellow-400 uppercase tracking-wider mb-2">Judul Berita</label>
                    <input type="text" id="judul" required class="w-full bg-black text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all">
                </div>

                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-inner">
                    <label class="block text-xs font-bold text-yellow-400 uppercase tracking-wider mb-2">Tanggal Publikasi</label>
                    <input type="text" id="tanggal" required placeholder="Contoh: 22 April 2026" class="w-full bg-black text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all">
                </div>

                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-inner">
                    <label class="block text-xs font-bold text-yellow-400 uppercase tracking-wider mb-2">URL Gambar Thumbnail</label>
                    <input type="url" id="gambar" required placeholder="https://..." class="w-full bg-black text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all">
                </div>

                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-inner">
                    <label class="block text-xs font-bold text-yellow-400 uppercase tracking-wider mb-2">Ringkasan Singkat</label>
                    <textarea id="ringkasan" required rows="2" class="w-full bg-black text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all"></textarea>
                </div>

                <div class="bg-gray-900 p-5 rounded-2xl border border-gray-800 shadow-inner">
                    <label class="block text-xs font-bold text-yellow-400 uppercase tracking-wider mb-2">Isi Berita Lengkap</label>
                    <textarea id="isi_berita" required rows="6" class="w-full bg-black text-white border border-gray-700 rounded-xl px-4 py-3 focus:outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 transition-all"></textarea>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-yellow-400 text-black font-extrabold text-lg py-4 rounded-2xl hover:bg-yellow-500 active:scale-95 transition-all shadow-[0_0_15px_rgba(250,204,21,0.3)]">
                    PUBLISH BERITA BARU
                </button>
            </form>
        </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-gray-900 border-t border-gray-800 px-6 py-3 flex justify-between items-center pb-safe z-50">
        <button onclick="switchTab('beranda')" id="nav-beranda" class="nav-btn flex flex-col items-center gap-1 text-yellow-400 transition-colors w-1/3">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[10px] font-bold">Beranda</span>
        </button>
        
        <button onclick="switchTab('posting')" id="nav-posting" class="nav-btn flex flex-col items-center gap-1 text-gray-500 transform -translate-y-4 w-1/3 transition-colors">
            <div id="nav-posting-icon" class="bg-gray-800 text-gray-400 p-3 rounded-full shadow-lg transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            </div>
            <span class="text-[10px] font-bold mt-1">Posting</span>
        </button>

        <button class="nav-btn flex flex-col items-center gap-1 text-gray-500 hover:text-yellow-400 transition-colors w-1/3 opacity-50 cursor-not-allowed">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
            <span class="text-[10px] font-bold">Setting</span>
        </button>
    </nav>

    <script>
        // =========================================================
        // PENTING: MASUKKAN URL SHEETDB ANDA DI SINI
        // =========================================================
        const API_URL = "https://sheetdb.io/api/v1/qwp7ldnxe073c";
        
        let databaseBerita = []; // Menyimpan data sementara
        let isEditMode = false;

        // Inisialisasi saat aplikasi pertama dibuka
        window.onload = () => {
            loadDaftarBerita();
        };

        // =========================================================
        // 1. SISTEM TAB NAVIGASI BAWAH
        // =========================================================
        function switchTab(tabId) {
            // Sembunyikan semua tab
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');

            // Reset warna semua tombol navigasi
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-yellow-400');
                btn.classList.add('text-gray-500');
            });
            
            // Reset ikon tengah (Posting)
            const postIcon = document.getElementById('nav-posting-icon');
            postIcon.className = "bg-gray-800 text-gray-400 p-3 rounded-full shadow-lg transition-all";

            // Warnai tombol yang aktif
            const activeBtn = document.getElementById('nav-' + tabId);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('text-yellow-400');

            if(tabId === 'posting') {
                postIcon.className = "bg-yellow-400 text-black p-3 rounded-full shadow-[0_0_15px_rgba(250,204,21,0.4)] transition-all";
            } else if (tabId === 'beranda') {
                loadDaftarBerita(); // Muat ulang data saat kembali ke beranda
            }
        }

        // =========================================================
        // 2. FITUR GET: MENAMPILKAN DAFTAR BERITA
        // =========================================================
        async function loadDaftarBerita() {
            const container = document.getElementById('list-berita-container');
            const loader = document.getElementById('global-loader');
            
            loader.classList.remove('hidden');
            
            try {
                const response = await fetch(API_URL);
                databaseBerita = await response.json();
                
                // Balikkan agar yang terbaru (bawah di sheet) muncul di atas
                databaseBerita.reverse();

                container.innerHTML = '';
                
                if (databaseBerita.length === 0 || databaseBerita[0].id === undefined) {
                    container.innerHTML = '<p class="text-center text-gray-500 text-sm mt-10">Belum ada berita. Mulai posting!</p>';
                    return;
                }

                databaseBerita.forEach(berita => {
                    if(!berita.id) return; // Skip baris kosong
                    
                    const card = `
                        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 flex gap-4 items-center">
                            <img src="${berita.gambar}" alt="Thumbnail" class="w-20 h-20 object-cover rounded-xl border border-gray-700">
                            <div class="flex-grow">
                                <span class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">${berita.tanggal}</span>
                                <h3 class="text-sm font-bold text-gray-200 line-clamp-2 mt-1 mb-3">${berita.judul}</h3>
                                <div class="flex gap-2">
                                    <button onclick="siapkanEdit('${berita.id}')" class="flex-1 bg-gray-800 hover:bg-gray-700 text-yellow-400 text-xs font-bold py-2 rounded-lg transition-colors">EDIT</button>
                                    <button onclick="hapusBerita('${berita.id}')" class="flex-1 bg-red-900/30 hover:bg-red-900/50 text-red-400 text-xs font-bold py-2 rounded-lg transition-colors border border-red-900/50">HAPUS</button>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                container.innerHTML = '<p class="text-center text-red-500 text-sm mt-10">Gagal mengambil data. Cek koneksi & URL API.</p>';
            } finally {
                loader.classList.add('hidden');
            }
        }

        // =========================================================
        // 3. FITUR EDIT: MENYIAPKAN FORM UNTUK UPDATE
        // =========================================================
        function siapkanEdit(id) {
            const berita = databaseBerita.find(b => b.id === id);
            if (!berita) return;

            // Masukkan data ke dalam form
            document.getElementById('edit-id').value = berita.id;
            document.getElementById('judul').value = berita.judul;
            document.getElementById('tanggal').value = berita.tanggal;
            document.getElementById('gambar').value = berita.gambar;
            document.getElementById('ringkasan').value = berita.ringkasan;
            document.getElementById('isi_berita').value = berita.isi_berita || '';

            // Ubah tampilan form ke mode edit
            isEditMode = true;
            document.getElementById('form-title').innerText = "Edit Berita (ID: " + id.substring(0,6) + "...)";
            document.getElementById('btn-batal-edit').classList.remove('hidden');
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerHTML = "SIMPAN PERUBAHAN";
            btnSubmit.className = "w-full bg-blue-600 text-white font-extrabold text-lg py-4 rounded-2xl hover:bg-blue-700 active:scale-95 transition-all shadow-[0_0_15px_rgba(37,99,235,0.3)]";

            // Pindah ke tab posting
            switchTab('posting');
        }

        function batalEdit() {
            isEditMode = false;
            document.getElementById('form-berita').reset();
            document.getElementById('edit-id').value = '';
            
            // Kembalikan tampilan form ke mode posting baru
            document.getElementById('form-title').innerText = "Buat Berita Baru";
            document.getElementById('btn-batal-edit').classList.add('hidden');
            
            const btnSubmit = document.getElementById('btn-submit');
            btnSubmit.innerHTML = "PUBLISH BERITA BARU";
            btnSubmit.className = "w-full bg-yellow-400 text-black font-extrabold text-lg py-4 rounded-2xl hover:bg-yellow-500 active:scale-95 transition-all shadow-[0_0_15px_rgba(250,204,21,0.3)]";
        }

        // =========================================================
        // 4. FITUR POST & PATCH: MENYIMPAN ATAU UPDATE BERITA
        // =========================================================
        async function simpanBerita(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            const statusBox = document.getElementById('status-pesan');
            const idEdit = document.getElementById('edit-id').value;
            
            btn.innerHTML = `MENGIRIM DATA...`;
            btn.classList.add('opacity-70', 'cursor-not-allowed');
            btn.disabled = true;

            const dataBerita = {
                id: isEditMode ? idEdit : Date.now().toString(),
                judul: document.getElementById('judul').value,
                tanggal: document.getElementById('tanggal').value,
                gambar: document.getElementById('gambar').value,
                ringkasan: document.getElementById('ringkasan').value,
                isi_berita: document.getElementById('isi_berita').value
            };

            try {
                let fetchConfig = {};
                let targetUrl = API_URL;

                if (isEditMode) {
                    // Logika Update (PATCH) berdasarkan ID kolom di Google Sheets
                    targetUrl = `${API_URL}/id/${idEdit}`;
                    fetchConfig = {
                        method: 'PATCH', // SheetDB menggunakan PATCH untuk update baris
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: dataBerita })
                    };
                } else {
                    // Logika Buat Baru (POST)
                    fetchConfig = {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: [dataBerita] })
                    };
                }

                const response = await fetch(targetUrl, fetchConfig);
                const result = await response.json();

                if (result.updated === 1 || result.created === 1) {
                    statusBox.innerHTML = isEditMode ? "✅ Berita Berhasil Diperbarui!" : "✅ Berita Berhasil Dipublish!";
                    statusBox.className = "mb-6 p-4 rounded-xl text-sm font-bold text-center border bg-green-900/30 text-green-400 border-green-800 block";
                    
                    batalEdit(); // Reset form dan kembalikan ke mode default
                    switchTab('beranda'); // Langsung kembali ke daftar berita
                } else {
                    throw new Error("Gagal memproses ke database");
                }
            } catch (error) {
                statusBox.innerHTML = "❌ Terjadi Kesalahan! Cek koneksi atau URL API.";
                statusBox.className = "mb-6 p-4 rounded-xl text-sm font-bold text-center border bg-red-900/30 text-red-400 border-red-800 block";
            } finally {
                btn.innerHTML = isEditMode ? "SIMPAN PERUBAHAN" : "PUBLISH BERITA BARU";
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                btn.disabled = false;
                
                setTimeout(() => { statusBox.classList.add('hidden'); }, 4000);
            }
        }

        // =========================================================
        // 5. FITUR DELETE: MENGHAPUS BERITA
        // =========================================================
        async function hapusBerita(id) {
            if (!confirm("Peringatan: Apakah Anda yakin ingin menghapus berita ini permanen dari website?")) return;
            
            const loader = document.getElementById('global-loader');
            loader.classList.remove('hidden');

            try {
                // SheetDB menggunakan DELETE /kolom/nilai
                const response = await fetch(`${API_URL}/id/${id}`, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                
                if (result.deleted === 1) {
                    alert("Berita berhasil dihapus!");
                    loadDaftarBerita(); // Refresh daftar berita
                } else {
                    throw new Error("Data tidak ditemukan");
                }
            } catch (error) {
                alert("Gagal menghapus berita. Coba lagi nanti.");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
