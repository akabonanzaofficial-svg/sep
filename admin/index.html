<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin - Serikat Ekonomi Pesantren</title>
  
  <!-- Widget Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    // 1. KITA BERITAHU SISTEM DI MANA PINTU LOGIN NETLIFY BERADA
    // PENTING: Ganti link di bawah ini dengan URL Netlify Anda sendiri!
    netlifyIdentity.init({
      APIUrl: "https://website-sep.netlify.app/.netlify/identity" 
    });

    // 2. KONFIGURASI CMS
    CMS.init({
      config: {
        backend: {
          name: 'git-gateway', // Berubah menjadi git-gateway karena kita menggunakan Netlify Identity
          branch: 'main' // Ubah ke 'master' jika branch GitHub Anda bernama master
        },
        
        media_folder: 'images/uploads',
        public_folder: '/images/uploads',
        
        collections: [
          {
            name: 'berita',
            label: 'Daftar Berita',
            folder: 'content/berita',
            create: true,
            slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
            format: 'json',
            fields: [
              { label: 'Judul Berita', name: 'judul', widget: 'string' },
              { label: 'Tanggal', name: 'tanggal', widget: 'datetime', format: 'DD MMMM YYYY', date_format: 'DD MMMM YYYY', time_format: false },
              { label: 'Gambar Utama', name: 'gambar', widget: 'image', required: false },
              { label: 'Ringkasan', name: 'ringkasan', widget: 'text', hint: 'Teks singkat yang muncul di halaman depan.' },
              { label: 'Isi Berita Lengkap', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });

    // 3. LOGIKA SETELAH LOGIN
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
